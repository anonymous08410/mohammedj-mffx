<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate G10 Macro Dashboard Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --card: #0f1429;
            --border: #1a2040;
            --text-primary: #e0e6f6;
            --text-secondary: #8b92b0;
            --text-muted: #5a6080;
            --accent-up: #10b981;
            --accent-down: #ef4444;
            --accent-neutral: #6366f1;
            --accent-purple: #a78bfa;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 12px;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent-purple), #8b5cf6);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(167, 139, 250, 0.2);
        }

        .error-message {
            color: var(--accent-down);
            font-size: 11px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 4px;
            display: none;
            text-align: center;
        }

        /* DASHBOARD */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            background: #0a0e1a;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            overflow-x: auto;
            font-size: 11px;
        }

        .top-bar-left {
            display: flex;
            gap: 30px;
            flex: 1;
            overflow-x: auto;
        }

        .top-bar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .logout-btn {
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-down);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .stat-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .stat.up .stat-value { color: var(--accent-up); }
        .stat.down .stat-value { color: var(--accent-down); }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            background: #0a0e1a;
            padding: 0 20px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            white-space: nowrap;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-purple);
            border-bottom-color: var(--accent-purple);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .card-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .data-label {
            color: var(--text-secondary);
        }

        .data-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .heatmap-cell {
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        .heat-score {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .score-5 { background: rgba(16, 185, 129, 0.3); color: var(--accent-up); }
        .score-4 { background: rgba(59, 130, 246, 0.3); color: #3b82f6; }
        .score-3 { background: rgba(99, 102, 241, 0.3); color: var(--accent-neutral); }
        .score-2 { background: rgba(245, 158, 11, 0.3); color: #f59e0b; }
        .score-1 { background: rgba(239, 68, 68, 0.3); color: var(--accent-down); }

        .pair-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .pair-cell {
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            border: 2px solid;
        }

        .pair-strong { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.5); color: var(--accent-up); }
        .pair-neutral { background: rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.5); color: var(--accent-neutral); }
        .pair-weak { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); color: var(--accent-down); }

        .pair-name {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pair-change {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .scorecard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .scorecard-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .scorecard-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 12px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .score-bar-bg {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            flex: 1;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-down), var(--accent-neutral), var(--accent-up));
            border-radius: 3px;
        }

        .selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .selector > div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selector select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>

        function getMacroScore(data) {
            let score = 5;
            if (data.macroData.gdpGrowth > 1) score += 1;
            if (data.macroData.unemployment < 4) score += 1;
            if (data.inflation < 3) score += 0.5;
            if (data.realYields.rea_10y > 1.5) score += 1;
            if (data.rate > 3.5) score += 0.5;
            return Math.min(10, score).toFixed(1);
        }

        function getScoreClass(score) {
            if (score >= 8) return 'score-5';
            if (score >= 6.5) return 'score-4';
            if (score >= 5) return 'score-3';
            if (score >= 3) return 'score-2';
            return 'score-1';
        }

            const pairs = [
                ['EUR', 'USD'], ['GBP', 'USD'], ['USD', 'JPY'], ['AUD', 'USD'],
                ['USD', 'CAD'], ['NZD', 'USD'], ['EUR', 'JPY'], ['AUD', 'NZD']

            for (const [c1, c2] of pairs) {
                const d1 = allData.g10Data[c1];

                const strength = (d1.rate - d2.rate) + (d1.realYields.rea_10y - d2.realYields.rea_10y);

                html += `<div class="pair-cell ${pairClass}"><div class="pair-name">${c1}/${c2}</div><div class="pair-change">${strength > 0 ? '↑' : '↓'}${Math.abs(strength).toFixed(2)}%</div></div>`;

                    </div>
                `;
            }
            
            if (data2) {
                html += `
                    <div>
                        <div style="font-size: 14px; font-weight: 700; color: var(--accent-purple); margin-bottom: 15px;">${c2}</div>

                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('cross').innerHTML = html;
            
            // Attach event listeners AFTER rendering
            setTimeout(() => {
                const sel1 = document.getElementById('cross1');
                const sel2 = document.getElementById('cross2');
                if (sel1) sel1.addEventListener('change', renderCross);
                if (sel2) sel2.addEventListener('change', renderCross);
            }, 100);
        }



        function renderNews() {
            let html = '<h3 style="margin-bottom: 20px;">📰 Market Headlines</h3>';
            html += '<style>';
            html += '.news-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 12px; }';
            html += '.news-card:hover { border-color: var(--accent-purple); }';
            html += '.news-title { font-weight: 600; font-size: 13px; color: var(--text-primary); }';
            html += '</style>';
            
            const newsItems = [
                { title: 'Fed Powell: Inflation Remains Sticky', source: 'Bloomberg', summary: 'Federal Reserve Chair emphasizes cautious approach.' },
                { title: 'BOE Expected to Hold at 5.25%', source: 'Reuters', summary: 'Bank of England holds rates steady.' },
                { title: 'USD Strength Pressures EM', source: 'FXStreet', summary: 'Dollar breaks above 105 on strong data.' },
                { title: 'ECB Signals Rate Cuts Coming', source: 'CNBC', summary: 'European Central Bank prepares pivot.' },
                { title: 'NFP Beats Expectations', source: 'DailyFX', summary: 'US jobs report exceeds forecast.' },
                { title: 'Oil Rallies on OPEC Cuts', source: 'MarketWatch', summary: 'Crude climbs as production falls.' },
                { title: 'Gold Hits 2-Month High', source: 'Investing.com', summary: 'Safe-haven demand drives bullion.' },
                { title: 'AUD/USD Breaks 0.71', source: 'FXPro', summary: 'Australian Dollar strengthens.' }
            ];
            
            for (let i = 0; i < newsItems.length; i++) {
                const item = newsItems[i];
                html += '<div class="news-card">';
                html += '<div class="news-title">' + item.title + '</div>';
                html += '<div style="font-size: 10px; color: var(--text-muted); margin-top: 6px;">';
                html += '<span style="font-weight: 700;">📍 ' + item.source + '</span> • Today IST';
                html += '</div>';
                html += '<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">' + item.summary + '</div>';
                html += '</div>';
            }
            
            document.getElementById('news').innerHTML = html;
        }
