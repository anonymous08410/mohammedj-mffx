<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G10 Macro Dashboard - MarketContext Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --card: #0f1429;
            --border: #1a2040;
            --text-primary: #e0e6f6;
            --text-secondary: #8b92b0;
            --text-muted: #5a6080;
            --accent-up: #10b981;
            --accent-down: #ef4444;
            --accent-neutral: #6366f1;
            --accent-purple: #a78bfa;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 12px;
            line-height: 1.5;
        }

        .top-bar {
            background: #0a0e1a;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            overflow-x: auto;
            font-size: 11px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .stat.up .stat-value {
            color: var(--accent-up);
        }

        .stat.down .stat-value {
            color: var(--accent-down);
        }

        .stat-change {
            font-size: 10px;
            margin-left: 4px;
        }

        .stat.up .stat-change {
            color: var(--accent-up);
        }

        .stat.down .stat-change {
            color: var(--accent-down);
        }

        .main-container {
            display: flex;
            height: calc(100vh - 80px);
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .header-section {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .currency-selector {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 20px;
            height: 100%;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .indicator-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            flex: 1;
        }

        .indicator-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .indicator-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .indicator-subtext {
            font-size: 11px;
            color: var(--text-muted);
        }

        .theme {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .theme-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .theme-value {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .theme-sentiment {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .sentiment-rising {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-up);
        }

        .sentiment-falling {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-down);
        }

        .sentiment-stable {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-neutral);
        }

        .sentiment-hiking {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-down);
        }

        .sentiment-cutting {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-up);
        }

        .sentiment-neutral {
            background: rgba(139, 146, 176, 0.2);
            color: var(--text-secondary);
        }

        .fx-pair-box {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            flex: 2;
        }

        .fx-pair-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .fx-pair-value {
            font-size: 48px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 12px;
        }

        .fx-pair-value.negative {
            color: var(--accent-down);
        }

        .fx-pair-value.positive {
            color: var(--accent-up);
        }

        .fx-pair-info {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .fx-pair-sentiment {
            display: inline-block;
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-down);
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .right-panel {
            width: 350px;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .releases-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .releases-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .release-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .release-event {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .release-value {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .release-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
        }

        .release-prev {
            color: var(--text-muted);
        }

        .release-impact {
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .impact-beat {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-up);
        }

        .impact-miss {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-down);
        }

        .impact-inline {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-neutral);
        }

        .bottom-bar {
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            background: #0a0e1a;
            display: flex;
            gap: 15px;
            font-size: 11px;
        }

        .calendar-btn {
            padding: 6px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 3px;
        }

        .calendar-btn.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }

        .calendar-info {
            color: var(--text-muted);
        }

        .calendar-counts {
            color: var(--text-secondary);
            font-weight: 600;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- TOP TICKER BAR -->
    <div class="top-bar" id="topBar"></div>

    <!-- MAIN GRID -->
    <div class="main-container">
        <!-- LEFT PANEL (4-COLUMN GRID) -->
        <div class="left-panel">
            <div class="header-section">
                <div>
                    <span id="currencyLabel" style="color: var(--text-muted); font-size: 11px; text-transform: uppercase;">Select Currency:</span>
                </div>
                <select class="currency-selector" id="currencySelector" onchange="switchCurrency(this.value)">
                    <option value="USD">USD - United States</option>
                    <option value="EUR">EUR - Eurozone</option>
                    <option value="GBP">GBP - United Kingdom</option>
                    <option value="JPY">JPY - Japan</option>
                    <option value="CAD">CAD - Canada</option>
                    <option value="AUD">AUD - Australia</option>
                    <option value="NZD">NZD - New Zealand</option>
                    <option value="CHF">CHF - Switzerland</option>
                </select>
            </div>

            <div class="grid-container">
                <!-- COLUMN 1: LEADING INDICATORS -->
                <div class="column" id="column1"></div>

                <!-- COLUMN 2: THEMES -->
                <div class="column" id="column2"></div>

                <!-- COLUMN 3: FX PAIR -->
                <div class="column" id="column3"></div>

                <!-- COLUMN 4: RATE EXPECTATIONS -->
                <div class="column" id="column4"></div>
            </div>
        </div>

        <!-- RIGHT PANEL: RECENT RELEASES -->
        <div class="right-panel">
            <div class="releases-header">🔴 RECENT RELEASES</div>
            <div class="releases-content" id="releasesContent"></div>
        </div>
    </div>

    <!-- BOTTOM BAR: CALENDAR -->
    <div class="bottom-bar">
        <button class="calendar-btn active">CALENDAR</button>
        <span id="currencyPair" style="color: var(--text-secondary); font-weight: 600;">USD/USD</span>
        <span style="color: var(--text-muted);">ALL</span>
        <span class="calendar-counts" id="calendarCounts">11 released</span>
        <span class="calendar-counts" id="calendarUpcoming">1e upcoming</span>
    </div>

    <script>
        const API_URL = 'https://macro-fundamentals-2.onrender.com';
        let currentCurrency = 'USD';
        let allData = {};

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/api/dashboard`);
                allData = await res.json();
                renderDashboard();
            } catch (e) {
                console.error('Error:', e);
            }
        }

        function switchCurrency(curr) {
            currentCurrency = curr;
            renderDashboard();
        }

        function renderDashboard() {
            if (!allData.g10Data || !allData.g10Data[currentCurrency]) return;

            const curr = allData.g10Data[currentCurrency];

            // TOP BAR
            const topBar = `
                <div class="stat"><span class="stat-label">DOT</span><span class="stat-value">${allData.topStats.dot.value}%</span><span class="stat-change ${allData.topStats.dot.direction}">${allData.topStats.dot.change > 0 ? '+' : ''}${allData.topStats.dot.change}%</span></div>
                <div class="stat"><span class="stat-label">Institutions</span><span class="stat-value">${allData.topStats.institutions.value}%</span><span class="stat-change ${allData.topStats.institutions.direction}">${allData.topStats.institutions.change > 0 ? '+' : ''}${allData.topStats.institutions.change}%</span></div>
                <div class="stat"><span class="stat-label">Retail</span><span class="stat-value">${allData.topStats.retail.value}%</span><span class="stat-change ${allData.topStats.retail.direction}">${allData.topStats.retail.change > 0 ? '+' : ''}${allData.topStats.retail.change}%</span></div>
                <div class="stat"><span class="stat-label">Oil</span><span class="stat-value">$${allData.topStats.oil.value}</span><span class="stat-change ${allData.topStats.oil.direction}">${allData.topStats.oil.change > 0 ? '+' : ''}${allData.topStats.oil.change}%</span></div>
                <div class="stat"><span class="stat-label">Gold</span><span class="stat-value">$${allData.topStats.gold.value}</span><span class="stat-change ${allData.topStats.gold.direction}">${allData.topStats.gold.change > 0 ? '+' : ''}${allData.topStats.gold.change}%</span></div>
                <div class="stat"><span class="stat-label">Silver</span><span class="stat-value">$${allData.topStats.silver.value}</span><span class="stat-change ${allData.topStats.silver.direction}">${allData.topStats.silver.change > 0 ? '+' : ''}${allData.topStats.silver.change}%</span></div>
                <div class="stat"><span class="stat-label">DXY</span><span class="stat-value">${allData.topStats.dxy.value}</span><span class="stat-change ${allData.topStats.dxy.direction}">${allData.topStats.dxy.change > 0 ? '+' : ''}${allData.topStats.dxy.change}%</span></div>
            `;
            document.getElementById('topBar').innerHTML = topBar;

            // COLUMN 1: LEADING INDICATORS
            const col1 = `
                <div class="indicator-box">
                    <div class="indicator-title">PPI</div>
                    <div class="indicator-value">${curr.leadingIndicators.ppi.value}%</div>
                    <div class="indicator-subtext">↑ ${curr.leadingIndicators.ppi.change}</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Economic Sentiment</div>
                    <div class="indicator-value">${curr.leadingIndicators.economicSentiment.value}</div>
                    <div class="indicator-subtext">${curr.leadingIndicators.economicSentiment.change > 0 ? '↑' : '↓'} ${curr.leadingIndicators.economicSentiment.change}</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Retail Sales</div>
                    <div class="indicator-value">${curr.leadingIndicators.retailSales.value}%</div>
                    <div class="indicator-subtext">${curr.leadingIndicators.retailSales.change > 0 ? '↑' : '↓'} ${curr.leadingIndicators.retailSales.change}</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Labour Market Index</div>
                    <div class="indicator-value">${curr.leadingIndicators.labourMarketIndex.value}</div>
                    <div class="indicator-subtext">${curr.leadingIndicators.labourMarketIndex.change > 0 ? '↑' : '↓'} ${curr.leadingIndicators.labourMarketIndex.change}</div>
                </div>
            `;
            document.getElementById('column1').innerHTML = col1;

            // COLUMN 2: THEMES
            const col2 = curr.themes.map(t => `
                <div class="theme">
                    <div class="theme-label">${t.name}</div>
                    <div class="theme-value">${t.value}${typeof t.value === 'number' ? '%' : ''}</div>
                    <span class="theme-sentiment sentiment-${t.sentiment}">${t.sentiment}</span>
                </div>
            `).join('');
            document.getElementById('column2').innerHTML = col2;

            // COLUMN 3: FX PAIR (LARGE)
            const fxPair = `${currentCurrency}/USD`;
            const col3 = `
                <div class="fx-pair-box">
                    <div class="fx-pair-name">${fxPair}</div>
                    <div class="fx-pair-value ${curr.macroData.gdpGrowth > 0 ? 'positive' : 'negative'}">-1.60%</div>
                    <div class="fx-pair-info">Interest Differential</div>
                    <div style="margin-bottom: 12px; color: var(--text-muted); font-size: 10px;">2Y SPREAD -140bp</div>
                    <div class="fx-pair-sentiment">- NEGATIVE</div>
                </div>
            `;
            document.getElementById('column3').innerHTML = col3;

            // COLUMN 4: RATE EXPECTATIONS
            const col4 = `
                <div class="indicator-box">
                    <div class="indicator-title">Interest Rates</div>
                    <div class="indicator-value">${curr.rate}%</div>
                    <div class="indicator-subtext">Policy Rate</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Inflation</div>
                    <div class="indicator-value">${curr.inflation}%</div>
                    <div class="indicator-subtext">Headline YoY</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Core Inflation</div>
                    <div class="indicator-value">${curr.macroData.coreInflation}%</div>
                    <div class="indicator-subtext">Latest Reading</div>
                </div>
                <div class="indicator-box">
                    <div class="indicator-title">Unemployment</div>
                    <div class="indicator-value">${curr.macroData.unemployment}%</div>
                    <div class="indicator-subtext">Latest Reading</div>
                </div>
            `;
            document.getElementById('column4').innerHTML = col4;

            // RECENT RELEASES
            const releases = curr.recentReleases.map(r => `
                <div class="release-item">
                    <div class="release-event">${r.event}</div>
                    <div class="release-value">${r.value}</div>
                    <div class="release-meta">
                        <span class="release-prev">Prev: ${r.prev}</span>
                        <span class="release-impact impact-${r.impact.toLowerCase()}">${r.impact}</span>
                    </div>
                    <div style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">${r.time}</div>
                </div>
            `).join('');
            document.getElementById('releasesContent').innerHTML = releases;

            // UPDATE BOTTOM BAR
            document.getElementById('currencyPair').textContent = fxPair;
            document.getElementById('calendarCounts').textContent = `${allData.calendar.filter(c => !c.actual).length} released`;
            document.getElementById('calendarUpcoming').textContent = `${allData.calendar.filter(c => c.actual).length} upcoming`;
        }

        // INITIAL LOAD
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
