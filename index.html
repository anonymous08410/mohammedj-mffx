<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate G10 Macro Dashboard Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --card: #0f1429;
            --border: #1a2040;
            --text-primary: #e0e6f6;
            --text-secondary: #8b92b0;
            --text-muted: #5a6080;
            --accent-up: #10b981;
            --accent-down: #ef4444;
            --accent-neutral: #6366f1;
            --accent-purple: #a78bfa;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 12px;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent-purple), #8b5cf6);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(167, 139, 250, 0.2);
        }

        .error-message {
            color: var(--accent-down);
            font-size: 11px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 4px;
            display: none;
            text-align: center;
        }

        /* DASHBOARD */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            background: #0a0e1a;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            overflow-x: auto;
            font-size: 11px;
        }

        .top-bar-left {
            display: flex;
            gap: 30px;
            flex: 1;
            overflow-x: auto;
        }

        .top-bar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .logout-btn {
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-down);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .stat-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .stat.up .stat-value { color: var(--accent-up); }
        .stat.down .stat-value { color: var(--accent-down); }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            background: #0a0e1a;
            padding: 0 20px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            white-space: nowrap;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-purple);
            border-bottom-color: var(--accent-purple);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .card-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .data-label {
            color: var(--text-secondary);
        }

        .data-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .heatmap-cell {
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        .heat-score {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .score-5 { background: rgba(16, 185, 129, 0.3); color: var(--accent-up); }
        .score-4 { background: rgba(59, 130, 246, 0.3); color: #3b82f6; }
        .score-3 { background: rgba(99, 102, 241, 0.3); color: var(--accent-neutral); }
        .score-2 { background: rgba(245, 158, 11, 0.3); color: #f59e0b; }
        .score-1 { background: rgba(239, 68, 68, 0.3); color: var(--accent-down); }

        .pair-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .pair-cell {
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            border: 2px solid;
        }

        .pair-strong { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.5); color: var(--accent-up); }
        .pair-neutral { background: rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.5); color: var(--accent-neutral); }
        .pair-weak { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); color: var(--accent-down); }

        .pair-name {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pair-change {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .scorecard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .scorecard-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
        }

        .scorecard-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 12px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .score-bar-bg {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            flex: 1;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-down), var(--accent-neutral), var(--accent-up));
            border-radius: 3px;
        }

        .selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .selector > div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selector select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-title">🔐 G10 Dashboard</div>
            <div class="login-subtitle">Private Access Only</div>
            
            <div class="input-group">
                <label class="input-label">Password</label>
                <input 
                    type="password" 
                    id="passwordInput" 
                    class="input-field" 
                    placeholder="Enter password"
                    onkeypress="if(event.key==='Enter') checkPassword()"
                    autofocus
                >
            </div>

            <button class="login-btn" onclick="checkPassword()">🔓 Access Dashboard</button>
            <div class="error-message" id="errorMessage">❌ Incorrect password. Try again.</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="container" id="dashboardContainer" style="display: none;">
        <div class="top-bar">
            <div class="top-bar-left" id="topBar">Loading...</div>
            <div class="top-bar-right">
                <button class="logout-btn" onclick="logout()">🔒 Logout</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
            <div class="tab" onclick="switchTab('heatmap')">🔥 Heat</div>
            <div class="tab" onclick="switchTab('pairs')">💱 Pairs</div>
            <div class="tab" onclick="switchTab('score')">⭐ Score</div>
            <div class="tab" onclick="switchTab('riskreward')">🎯 R:R</div>
            <div class="tab" onclick="switchTab('surprise')">💥 Surprises</div>
            <div class="tab" onclick="switchTab('positioning')">📍 COT</div>
            <div class="tab" onclick="switchTab('overview')">🌍 Overview</div>
            <div class="tab" onclick="switchTab('inflation')">📈 Inflation</div>
            <div class="tab" onclick="switchTab('labour')">👥 Labour</div>
            <div class="tab" onclick="switchTab('pmi')">🏭 PMI</div>
            <div class="tab" onclick="switchTab('yields')">📉 Yields</div>
            <div class="tab" onclick="switchTab('cross')">🔄 Cross</div>
            <div class="tab" onclick="switchTab('juice')">💜 Juice</div>
            <div class="tab" onclick="switchTab('history')">📊 CPI</div>
            <div class="tab" onclick="switchTab('calendar')">📅 Calendar</div>
            <div class="tab" onclick="switchTab('news')">📰 News</div>
        </div>

        <div id="dashboard" class="content active"></div>
        <div id="heatmap" class="content"></div>
        <div id="pairs" class="content"></div>
        <div id="score" class="content"></div>
        <div id="riskreward" class="content"></div>
        <div id="surprise" class="content"></div>
        <div id="positioning" class="content"></div>
        <div id="overview" class="content"></div>
        <div id="inflation" class="content"></div>
        <div id="labour" class="content"></div>
        <div id="pmi" class="content"></div>
        <div id="yields" class="content"></div>
        <div id="cross" class="content"></div>
        <div id="juice" class="content"></div>
        <div id="history" class="content"></div>
        <div id="calendar" class="content"></div>
        <div id="news" class="content"></div>
    </div>

    <script>
        // ⚠️ CHANGE THIS PASSWORD TO YOUR OWN!
        const DASHBOARD_PASSWORD = "Mohammed2024"; // CHANGE THIS TO YOUR PASSWORD!

        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMessage');

            if (password === DASHBOARD_PASSWORD) {
                // Password correct
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardContainer').style.display = 'flex';
                sessionStorage.setItem('authenticated', 'true');
                initDashboard();
            } else {
                // Wrong password
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('passwordInput').focus();
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('authenticated') === 'true') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardContainer').style.display = 'flex';
                initDashboard();
            }
        });

        // === DASHBOARD CODE STARTS HERE ===
        const API_URL = 'https://macro-fundamentals-2.onrender.com';
        let allData = {};
        let dashboardCurrencyLeft = 'USD';
        let dashboardCurrencyRight = 'EUR';

        async function initDashboard() {
            try {
                const res = await fetch(`${API_URL}/api/dashboard`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allData = await res.json();
                renderAllTabs();
            } catch (e) {
                console.error('Error:', e);
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function renderTopBar() {
            if (!allData.topStats) return;
            const stats = allData.topStats;
            let html = `
                <div class="stat"><span>DOT</span><span class="stat-value">${stats.dot.value}%</span></div>
                <div class="stat"><span>Oil</span><span class="stat-value">$${stats.oil.value}</span></div>
                <div class="stat"><span>Gold</span><span class="stat-value">$${stats.gold.value}</span></div>
                <div class="stat"><span>DXY</span><span class="stat-value">${stats.dxy.value}</span></div>
                <div class="stat"><span>VIX</span><span class="stat-value">${stats.vix.value}</span></div>
                <div class="stat"><span>HY OAS</span><span class="stat-value">${stats.usHY}bp</span></div>
            `;
            document.getElementById('topBar').innerHTML = html;
        }

        function getMacroScore(data) {
            let score = 5;
            if (data.macroData.gdpGrowth > 1) score += 1;
            if (data.macroData.unemployment < 4) score += 1;
            if (data.inflation < 3) score += 0.5;
            if (data.realYields.rea_10y > 1.5) score += 1;
            if (data.rate > 3.5) score += 0.5;
            return Math.min(10, score).toFixed(1);
        }

        function getScoreClass(score) {
            if (score >= 8) return 'score-5';
            if (score >= 6.5) return 'score-4';
            if (score >= 5) return 'score-3';
            if (score >= 3) return 'score-2';
            return 'score-1';
        }

        function renderDashboard() {
            if (!allData.g10Data) return;
            const currLeft = allData.g10Data[dashboardCurrencyLeft];
            const currRight = allData.g10Data[dashboardCurrencyRight];
            if (!currLeft || !currRight) return;

            const rateDiff = currLeft.rate - currRight.rate;
            
            let html = `
                <div style="margin-bottom: 15px; display: flex; gap: 20px;">
                    <div><label style="color: var(--text-secondary); font-size: 11px; font-weight: 700;">LEFT:</label>
                    <select onchange="dashboardCurrencyLeft=this.value; renderDashboard()" style="background: var(--card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
                        ${Object.keys(allData.g10Data).map(c => `<option value="${c}" ${c === dashboardCurrencyLeft ? 'selected' : ''}>${c}</option>`).join('')}
                    </select></div>
                    <div><label style="color: var(--text-secondary); font-size: 11px; font-weight: 700;">RIGHT:</label>
                    <select onchange="dashboardCurrencyRight=this.value; renderDashboard()" style="background: var(--card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
                        ${Object.keys(allData.g10Data).map(c => `<option value="${c}" ${c === dashboardCurrencyRight ? 'selected' : ''}>${c}</option>`).join('')}
                    </select></div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: calc(100% - 40px);">
                    <div style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
                        <div style="font-size: 11px; color: var(--accent-purple); font-weight: 700;">⭐ ${dashboardCurrencyLeft} - ${getMacroScore(currLeft)}/10</div>
                        <div class="card"><div class="card-title">Policy Rate</div><div class="card-value">${currLeft.rate}%</div></div>
                        <div class="card"><div class="card-title">Inflation</div><div class="card-value">${currLeft.inflation}%</div></div>
                        <div class="card"><div class="card-title">Real 10Y</div><div class="card-value">${currLeft.realYields.rea_10y}%</div></div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
                        <div class="card"><div class="card-title">Growth</div><div class="card-value">${currLeft.macroData.gdpGrowth}%</div></div>
                        <div class="card"><div class="card-title">Unemployment</div><div class="card-value">${currLeft.macroData.unemployment}%</div></div>
                        <div class="card"><div class="card-title">PMI</div><div class="card-value">${currLeft.macroData.manufacturingPmi}</div></div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
                        <div class="card" style="padding: 30px; text-align: center; flex: 2;">
                            <div style="font-size: 20px; font-weight: 700; color: var(--accent-purple); margin-bottom: 15px;">${dashboardCurrencyLeft}/${dashboardCurrencyRight}</div>
                            <div style="font-size: 42px; font-weight: 700; font-family: 'Courier New', monospace; color: ${rateDiff < 0 ? 'var(--accent-down)' : 'var(--accent-up)'};">${rateDiff < 0 ? '' : '+'}${rateDiff.toFixed(2)}%</div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">Rate Diff</div>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
                        <div style="font-size: 11px; color: var(--accent-purple); font-weight: 700;">⭐ ${dashboardCurrencyRight} - ${getMacroScore(currRight)}/10</div>
                        <div class="card"><div class="card-title">Policy Rate</div><div class="card-value">${currRight.rate}%</div></div>
                        <div class="card"><div class="card-title">Inflation</div><div class="card-value">${currRight.inflation}%</div></div>
                        <div class="card"><div class="card-title">Real 10Y</div><div class="card-value">${currRight.realYields.rea_10y}%</div></div>
                    </div>
                </div>
            `;
            document.getElementById('dashboard').innerHTML = html;
        }

        function renderHeatmap() {
            if (!allData.g10Data) return;
            let html = `<h3 style="margin-bottom: 20px;">🔥 Macro Strength Heatmap</h3><div class="heatmap">`;
            for (const [code, data] of Object.entries(allData.g10Data)) {
                const score = getMacroScore(data);
                const scoreClass = getScoreClass(score);
                html += `<div class="heatmap-cell ${scoreClass}"><div class="heat-score">${score}</div><div style="font-size: 10px;">${code}</div></div>`;
            }
            html += '</div>';
            document.getElementById('heatmap').innerHTML = html;
        }

        function renderPairMatrix() {
            if (!allData.g10Data) return;
            let html = `<h3 style="margin-bottom: 20px;">💱 Currency Pair Matrix</h3><div class="pair-matrix">`;
            const pairs = [
                ['EUR', 'USD'], ['GBP', 'USD'], ['USD', 'JPY'], ['AUD', 'USD'],
                ['USD', 'CAD'], ['NZD', 'USD'], ['EUR', 'JPY'], ['AUD', 'NZD']
            ];
            for (const [c1, c2] of pairs) {
                const d1 = allData.g10Data[c1];
                const d2 = allData.g10Data[c2];
                if (!d1 || !d2) continue;
                const strength = (d1.rate - d2.rate) + (d1.realYields.rea_10y - d2.realYields.rea_10y);
                let pairClass = 'pair-neutral';
                if (strength > 1) pairClass = 'pair-strong';
                else if (strength < -1) pairClass = 'pair-weak';
                html += `<div class="pair-cell ${pairClass}"><div class="pair-name">${c1}/${c2}</div><div class="pair-change">${strength > 0 ? '↑' : '↓'}${Math.abs(strength).toFixed(2)}%</div></div>`;
            }
            html += '</div>';
            document.getElementById('pairs').innerHTML = html;
        }

        function renderScoreCard() {
            if (!allData.g10Data) return;
            let html = `<h3 style="margin-bottom: 20px;">⭐ Macro Scorecard</h3><div class="scorecard">`;
            for (const [code, data] of Object.entries(allData.g10Data)) {
                const score = getMacroScore(data);
                const inflScore = 10 - Math.min(data.inflation * 2, 10);
                const growthScore = Math.min(data.macroData.gdpGrowth * 10, 10);
                html += `
                    <div class="scorecard-item">

        function renderRiskReward() {

            let html = `<h3 style="margin-bottom: 20px;">🎯 Risk/Reward</h3>`;
            for (const setup of allData.tradingSetups) {
                const rr = ((setup.target - setup.entry) / (setup.entry - setup.stop)).toFixed(2);
                html += `
                    <div class="card" style="margin-bottom: 15px;">
                        <div style="font-weight: 700; color: var(--accent-purple); margin-bottom: 10px;">${setup.name}</div>
                        <div class="data-row"><span>Entry</span><span class="data-value">${setup.entry}</span></div>
                        <div class="data-row"><span>Target</span><span class="data-value">${setup.target}</span></div>
                        <div class="data-row"><span>Stop</span><span class="data-value">${setup.stop}</span></div>
                        <div class="data-row" style="border-bottom: none;"><span>R:R</span><span class="data-value">1:${rr}</span></div>
                    </div>
                `;
            }
            document.getElementById('riskreward').innerHTML = html;
        }

        function renderJuice() {

                USD: 'Fed at 3.75%. Inflation 4.2%, sticky. Real yields 1.85% - carry attractive.',

                GBP: 'BoE hold 3.75%. Labour strong 5.2% wages. Inflation sticky 3.8%.',

                html += `

        function renderHistory() {

                `;
            }
            html += '</div>';
            document.getElementById('history').innerHTML = html;
        }

        function renderCalendar() {
            if (!allData.calendar) return;
            let html = `
                <h3 style="margin-bottom: 20px;">📅 Economic Calendar (ForexFactory Style)</h3>
                <style>
                    .ff-calendar {
                        width: 100%;
                        border-collapse: collapse;
                    }
                    .ff-calendar thead {
                        background: rgba(99, 102, 241, 0.2);
                        border-bottom: 2px solid var(--border);
                    }
                    .ff-calendar th {
                        padding: 12px;
                        text-align: left;
                        font-weight: 700;
                        font-size: 11px;
                        text-transform: uppercase;
                        color: var(--accent-purple);
                        letter-spacing: 1px;
                    }
                    .ff-calendar td {
                        padding: 12px;
                        border-bottom: 1px solid var(--border);
                        font-size: 12px;
                    }
                    .ff-calendar tr:hover {
                        background: rgba(99, 102, 241, 0.1);
                    }
                    .event-date {
                        font-weight: 700;
                        color: var(--accent-purple);
                        min-width: 120px;
                    }
                    .event-time {
                        color: var(--text-muted);
                        font-size: 10px;
                    }
                    .event-country {
                        font-weight: 600;
                        color: var(--text-primary);
                    }
                    .event-name {
                        color: var(--text-secondary);
                        font-size: 11px;
                    }
                    .impact-high {
                        background: rgba(239, 68, 68, 0.2);
                        color: var(--accent-down);
                        padding: 3px 8px;
                        border-radius: 3px;
                        font-weight: 700;
                        font-size: 10px;
                    }
                    .impact-medium {
                        background: rgba(245, 158, 11, 0.2);
                        color: #f59e0b;
                        padding: 3px 8px;
                        border-radius: 3px;
                        font-weight: 700;
                        font-size: 10px;
                    }
                    .impact-low {
                        background: rgba(16, 185, 129, 0.2);
                        color: var(--accent-up);
                        padding: 3px 8px;
                        border-radius: 3px;
                        font-weight: 700;
                        font-size: 10px;
                    }
                </style>
                <table class="ff-calendar">
                    <thead>
                        <tr>
                            <th>📅 Date & Time (UTC)</th>
                            <th>🌍 Country</th>
                            <th>📊 Event</th>
                            <th>⚡ Impact</th>
                            <th>📈 Forecast</th>
                            <th>📉 Previous</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const event of allData.calendar) {
                const eventDate = new Date(event.date);
                const dateStr = eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = eventDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                const impactClass = event.importance === 'High' ? 'impact-high' : event.importance === 'Medium' ? 'impact-medium' : 'impact-low';
                
                html += `
                    <tr>
                        <td>
                            <div class="event-date">${dateStr}</div>
                            <div class="event-time">${timeStr} UTC</div>
                        </td>
                        <td><span class="event-country">${event.country}</span></td>
                        <td><span class="event-name">${event.event}</span></td>
                        <td><span class="${impactClass}">${event.importance}</span></td>
                        <td style="font-weight: 600; color: var(--accent-up);">${event.forecast}</td>
                        <td style="font-weight: 600; color: var(--accent-down);">${event.previous}</td>
                    </tr>
                `;
            }
            
            html += `
                    </tbody>
                </table>
            `;
            document.getElementById('calendar').innerHTML = html;
        }

            html += '</div>';

        function renderCross() {
            if (!allData.g10Data) return;
            
            const c1 = document.getElementById('cross1')?.value || 'USD';
            const c2 = document.getElementById('cross2')?.value || 'EUR';
            const data1 = allData.g10Data[c1];
            const data2 = allData.g10Data[c2];
            
            let html = `
                <h3 style="margin-bottom: 20px;">🔄 Currency Comparison</h3>
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div><label style="color: var(--text-secondary); font-size: 11px; font-weight: 700;">Currency 1:</label>
                    <select id="cross1" style="background: var(--card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
                        ${Object.keys(allData.g10Data).map(c => `<option value="${c}" ${c === c1 ? 'selected' : ''}>${c}</option>`).join('')}
                    </select></div>
                    <div><label style="color: var(--text-secondary); font-size: 11px; font-weight: 700;">Currency 2:</label>
                    <select id="cross2" style="background: var(--card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">
                        ${Object.keys(allData.g10Data).map(c => `<option value="${c}" ${c === c2 ? 'selected' : ''}>${c}</option>`).join('')}
                    </select></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            `;
            
            if (data1) {
                html += `
                    <div>
                        <div style="font-size: 14px; font-weight: 700; color: var(--accent-purple); margin-bottom: 15px;">${c1}</div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Policy Rate</div><div class="card-value">${data1.rate}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Inflation</div><div class="card-value">${data1.inflation}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Growth</div><div class="card-value">${data1.macroData.gdpGrowth}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Unemployment</div><div class="card-value">${data1.macroData.unemployment}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Real 10Y</div><div class="card-value">${data1.realYields.rea_10y}%</div></div>
                        <div class="card"><div class="card-title">Score</div><div class="card-value">${getMacroScore(data1)}/10</div></div>
                    </div>
                `;
            }
            
            if (data2) {
                html += `
                    <div>
                        <div style="font-size: 14px; font-weight: 700; color: var(--accent-purple); margin-bottom: 15px;">${c2}</div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Policy Rate</div><div class="card-value">${data2.rate}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Inflation</div><div class="card-value">${data2.inflation}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Growth</div><div class="card-value">${data2.macroData.gdpGrowth}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Unemployment</div><div class="card-value">${data2.macroData.unemployment}%</div></div>
                        <div class="card" style="margin-bottom: 10px;"><div class="card-title">Real 10Y</div><div class="card-value">${data2.realYields.rea_10y}%</div></div>
                        <div class="card"><div class="card-title">Score</div><div class="card-value">${getMacroScore(data2)}/10</div></div>
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('cross').innerHTML = html;
            
            // Attach event listeners AFTER rendering
            setTimeout(() => {
                const sel1 = document.getElementById('cross1');
                const sel2 = document.getElementById('cross2');
                if (sel1) sel1.addEventListener('change', renderCross);
                if (sel2) sel2.addEventListener('change', renderCross);
            }, 100);
        }

        function renderNews() {
            if (!allData.news) return;
            let html = `<h3 style="margin-bottom: 20px;">📰 Market Headlines (Live)</h3>`;
            for (const item of allData.news) {
                const newsDate = new Date();
                const timeStr = newsDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                const dateStr = newsDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                html += `
                    <div class="card" style="margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
                            <div style="font-weight: 600; flex: 1;">${item.title}</div>
                            <span style="font-size: 9px; color: var(--text-muted); white-space: nowrap; margin-left: 10px; font-weight: 700;">${timeStr}</span>

                `;
            }
            document.getElementById('news').innerHTML = html;
        }
